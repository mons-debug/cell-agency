# Cell Agency — Agent Capability Registry
# Single source of truth for all 22 agents.
# Used by: routing engine, Nadia (director), QA gate, MCP tools, planning.
#
# Query this registry to answer:
#   - "Which agent handles X task?"
#   - "What tools does agent X have?"
#   - "Which agents are in department Y?"
#   - "Which agents require approval before acting?"
#   - "What inputs does agent X need?"
#
# Update this file whenever an agent is added, modified, or removed.
# Last updated: 2026-03-28

meta:
  total_agents: 22
  departments: [management, strategy, creative, dev, marketing_ops]

agents:

  # ── MANAGEMENT ──────────────────────────────────────────────────────────────

  - id: nadia
    role: Agency Director
    department: management
    crew_file: crews/management_crew.yaml
    llm: gpt-4o-mini
    allow_delegation: true
    approval_required: false
    description: >
      Orchestrates all agency operations. Routes tasks to specialists,
      reviews quality, and is the single point of contact with Moncef.
      Reads SOUL.md, USER.md, MEMORY.md every session.
    capabilities:
      - orchestrate_agency_operations
      - route_tasks_to_specialists
      - review_deliverables
      - communicate_with_moncef
      - manage_approval_queue
      - track_project_status
      - read_daily_briefings
    handles_tasks:
      - any_unrouted_task
      - escalations
      - approval_decisions
      - morning_briefing
      - evening_summary
    tools:
      - agency.read_brand_vault
      - agency.list_clients
      - agency.search_memory
      - agency.log_daily
      - agency.read_calendar
      - agency.read_daily_log
      - agency.memory_get
      - crew.approval_queue_list
      - crew.approval_queue_resolve
      - crew.get_project_status
      - crew.discussion_log_read
    input_needs:
      required: []
      optional: [client_id, task_description]
    output_formats: [markdown, json, telegram_message]
    languages: [fr, ar, darija, en]

  - id: router
    role: Task Classifier and Dispatcher
    department: management
    crew_file: crews/management_crew.yaml
    llm: gpt-4o-mini
    allow_delegation: true
    approval_required: false
    description: >
      Classifies incoming messages using the smart routing engine.
      Calls agency.route_message first; uses LLM judgment only for
      low-confidence cases. Returns a complete routing JSON.
    capabilities:
      - classify_incoming_messages
      - extract_context_from_messages
      - route_to_correct_agent
      - identify_missing_inputs
    handles_tasks:
      - route_task
    tools:
      - agency.route_message
      - agency.explain_routing
      - agency.list_clients
      - agency.read_brand_vault
    input_needs:
      required: [task_description]
      optional: [client_id]
    output_formats: [json]
    languages: [fr, ar, darija, en]

  - id: qa_gate
    role: Quality Assurance Director
    department: management
    crew_file: crews/management_crew.yaml
    llm: gpt-4o-mini
    allow_delegation: false
    approval_required: false
    description: >
      Reviews all content and deliverables before they reach Moncef or
      the client. Checks brand compliance, language quality, factual
      accuracy, CTA clarity, and legal/sensitivity issues. Scores 1-10.
    capabilities:
      - review_content_brand_compliance
      - check_language_grammar
      - verify_factual_accuracy
      - validate_cta_presence
      - flag_sensitivity_issues
      - score_deliverables
      - add_to_approval_queue
    handles_tasks:
      - qa_review
    tools:
      - agency.read_brand_vault
      - crew.approval_queue_add
      - crew.discussion_log_read
    input_needs:
      required: [content_to_review, client_id]
      optional: [brand_guidelines]
    output_formats: [qa_report]
    languages: [fr, ar, darija, en]

