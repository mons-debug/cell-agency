    department: creative
    crew_file: crews/creative_crew.yaml
    llm: gpt-4o-mini
    allow_delegation: false
    approval_required: false
    description: >
      Creates brand-aligned content for all platforms. Trilingual (FR/AR/Darija).
      Specializes in Instagram captions, ad copy, articles, video scripts,
      email copy, and hashtag sets for the Moroccan market.
    capabilities:
      - instagram_caption_writing
      - ad_copy_writing
      - blog_article_writing
      - video_script_writing
      - email_copy_writing
      - hashtag_generation
      - multilingual_content_fr_ar_darija
