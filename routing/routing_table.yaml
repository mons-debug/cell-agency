# Cell Agency — Smart Routing Table
# Single source of truth for all task routing decisions.
#
# Structure per route:
#   skill:             OpenClaw skill name (matches skills/ folder)
#   triggers.keywords: Exact phrases / words that strongly indicate this route
#   triggers.regex:    Regex patterns for more flexible matching (Python re syntax)
#   crew:              CrewAI crew to invoke (management|strategy|creative|dev|marketing_ops)
#   task:              Task name within that crew's YAML
#   agent:             Preferred agent (informational — crew YAML assigns the task)
#   required_inputs:   Context fields that MUST be extracted before dispatching
#   optional_inputs:   Context fields that improve output if present
#   approval_required: Whether Moncef ✅ is needed before execution
#   priority:          Route matching priority (higher = checked first, 1-100)
#   confidence_floor:  Minimum keyword score to use this route without LLM fallback (0.0-1.0)

routes:

  # ── SOCIAL MEDIA ────────────────────────────────────────────────────────────

  - skill: social-pilot
    triggers:
      keywords:
        - "publish post"
        - "post to instagram"
        - "post on instagram"
        - "publish this"
        - "go live"
        - "schedule post"
        - "schedule this"
        - "publish approved"
        - "post approved"
        - "check engagement"
        - "check insights"
        - "instagram stats"
        - "delete post"
        - "remove post"
        - "publish to facebook"
        - "post to facebook"
      regex:
        - "publish.*(post|content|image|reel|carousel)"
        - "post.*(instagram|facebook|ig|fb)"
        - "schedule.*(post|content|for)"
        - "(engagement|reach|impressions|followers).*(check|pull|get|show)"
    crew: marketing_ops
    task: publish_approved_post
    agent: social_media_manager
    required_inputs:
      - client_id
    optional_inputs:
      - image_url
      - caption
      - scheduled_time
    approval_required: true
    priority: 90
    confidence_floor: 0.4

